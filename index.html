<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NAVAL SHOP - Streetwear Premium</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background: #0a0a0a; color: #fff; }
    .banner {
      height: 85vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), 
      url('https://images.unsplash.com/photo-1558769132-cb1aea458c5e?q=80&w=2070') center/cover;
      display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
    }
    h1 { font-size: 6em; margin: 0; text-shadow: 0 0 30px cyan; }
    p { font-size: 2em; margin: 10px; letter-spacing: 3px; }
    .btn { padding: 15px 40px; font-size: 1.3em; background: cyan; color: black; border: none; border-radius: 50px; cursor: pointer; margin-top: 30px; font-weight: bold; }
    
    .product { border: 1px solid #333; padding: 15px; margin: 10px; text-align: center; border-radius: 10px; background: #111; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; }
    .modal-content { background: #111; width: 90%; max-width: 500px; margin: 80px auto; padding: 25px; border-radius: 15px; }
    input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: none; color: white; border-radius: 8px; }
  </style>
</head>
<body>

  <!-- Banner -->
  <div class="banner">
    <h1>NAVAL SHOP</h1>
    <p>STREETWEAR PREMIUM • NAVALCARNERO</p>
    <button class="btn" onclick="changeSection('tienda')">VER COLECCIÓN</button>
  </div>

  <div style="text-align:center; padding:20px;">
    <button onclick="changeSection('tienda')">Tienda</button>
    <button onclick="changeSection('carrito')">Carrito (<span id="cart-count">0</span>)</button>
  </div>

  <div id="products-container" style="display:flex; flex-wrap:wrap; justify-content:center; padding:20px;"></div>

  <!-- Modal Formulario de Compra -->
  <div id="purchaseModal" class="modal">
    <div class="modal-content">
      <h2>Finalizar Compra</h2>
      <p id="selectedProductInfo"></p>
      
      <input type="text" id="customerName" placeholder="Nombre completo" required>
      <input type="email" id="customerEmail" placeholder="Correo electrónico" required>
      <textarea id="customerMessage" placeholder="Talla, dirección, comentarios..." rows="4"></textarea>
      
      <button onclick="submitPurchase()" style="background:cyan; color:black; padding:12px 30px; margin:10px 5px;">Enviar Pedido</button>
      <button onclick="closeModal()" style="padding:12px 30px;">Cancelar</button>
    </div>
  </div>

<script>
  let isAdmin = false;
  const adminEmail = "laachir@navalshp.com";
  let cart = [];
  let currentProductIndex = -1;

  // Pedir correo al entrar
  let userEmail = prompt("🔑 Introduce tu correo electrónico para acceder a Naval Shop:");
  
  if (!userEmail || userEmail.trim() === "") {
    alert("Debes introducir un correo para entrar.");
    window.location.reload();
  } else if (userEmail.toLowerCase().trim() === adminEmail) {
    isAdmin = true;
    alert("✅ Acceso de Administrador concedido");
  } else {
    alert("✅ Acceso correcto. Bienvenido a Naval Shop");
  }

  let products = [];   // Tienda vacía

  function renderProducts() {
    const container = document.getElementById("products-container");
    container.innerHTML = "<h2 style='width:100%; text-align:center;'>Próximamente nuevos productos...</h2>";
    document.getElementById("cart-count").innerText = cart.length;
  }

  function openPurchaseForm(index) {
    if (products.length === 0) return alert("No hay productos disponibles todavía.");
    currentProductIndex = index;
    document.getElementById("selectedProductInfo").innerHTML = `<strong>Producto:</strong> ${products[index].nombre} - ${products[index].precio}€`;
    document.getElementById("purchaseModal").style.display = "block";
  }

  function submitPurchase() {
    const name = document.getElementById("customerName").value;
    const email = document.getElementById("customerEmail").value;
    const message = document.getElementById("customerMessage").value;

    if (!name || !email) {
      alert("Nombre y correo son obligatorios");
      return;
    }

    console.log("%c NUEVA COMPRA RECIBIDA", "color:cyan; font-size:16px");
    console.log("Nombre:", name);
    console.log("Correo:", email);
    console.log("Mensaje:", message);
    console.log("Producto:", products[currentProductIndex]);

    alert(`✅ Pedido enviado correctamente!\nNos pondremos en contacto contigo pronto, ${name}.`);

    closeModal();
    cart = [];
    document.getElementById("cart-count").innerText = 0;
  }

  function closeModal() {
    document.getElementById("purchaseModal").style.display = "none";
  }

  function changeSection(sec) {
    renderProducts();
  }

  // Iniciar
  renderProducts();
</script>

</body>
</html>
